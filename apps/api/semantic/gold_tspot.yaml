# Semantic registry over KRW's gold_tspot schema (the lead slice).
#
# Derived from the live database and reconciled to the Executive Summary dashboard. The
# fixture DataSource seeds these same tables, so one registry serves both dev and prod.
#
# Scope: leads by channel / geography / time. The intake funnel (Leads Reached Voucher…),
# vouchers, and revenue need a filtered-measure capability the engine does not have yet
# (tracked separately); marketing spend and referrals await cross-schema access (#37).
#
# PII is excluded by construction: no contact name, phone, age, gender, or lat/lon column
# is named here, so the NL panel cannot surface one whatever it is asked.

constants:
  case_fee:
    value: 6000
    description: >-
      Average fee per signed case, in USD. Not stored anywhere in the warehouse: the Power BI
      model computes Revenue (Vouchers) as vouchers x this fee. Confirmed against the live
      dashboard to the dollar (20,977 vouchers x 6000 = $125,862,000). Pending Imran's
      confirmation that 6000 is current (#37).

entities:
  cases:
    label: "Leads"
    source: gold_tspot.cases
    joins:
      # Each case has at most one geo row (geo is 1:1 on LeadId, but ~38% of leads have
      # none) — many_to_one, so the compiler joins it fan-out-free and keeps unmatched
      # leads via the outer join.
      - to: geo
        left: LeadId
        right: LeadId
        cardinality: many_to_one
      # Many stage rows per case (the milestone history) — one_to_many, so the compiler
      # rejects grouping a case metric by a stage dimension rather than fanning out.
      - to: stages
        left: LeadId
        right: LeadId
        cardinality: one_to_many
  geo:
    label: "Geography"
    source: gold_tspot.geo
  stages:
    label: "Funnel stages"
    source: gold_tspot.stages

dimensions:
  channel:
    label: "Channel"
    entity: cases
    column: source_category
    members:
      ["CTV", "Linear TV", "Phone/SMS", "Facebook", "Referral", "Unknown",
       "Other Social Media", "Website/Email", "Other"]
    synonyms: ["source", "source category", "acquisition channel"]
  status:
    label: "Status"
    entity: cases
    column: Status
    synonyms: ["case status"]
  lead_date:
    label: "Lead date"
    entity: cases
    column: CreateDate
    date_role: lead
    synonyms: ["date", "created", "intake date"]
  state:
    label: "State"
    entity: geo
    column: State
    synonyms: ["province"]
  stage_name:
    label: "Funnel stage"
    entity: stages
    column: StageName
    synonyms: ["stage", "milestone"]

measures:
  lead_count:
    entity: cases
    agg: count
  distinct_leads:
    entity: cases
    agg: count
    column: LeadId
    distinct: true
  # Funnel measures live on `stages`: every lead has a "Lead" stage row, so a distinct
  # count of LeadId over all stages equals total leads — the denominator for stage rates.
  # Each stage-reached count is that distinct count scoped to one StageName.
  stage_leads:
    entity: stages
    agg: count
    column: LeadId
    distinct: true
  voucher_reached:
    entity: stages
    agg: count
    column: LeadId
    distinct: true
    filter: {column: StageName, equals: "Voucher (Initial Intake)"}
  xray_reached:
    entity: stages
    agg: count
    column: LeadId
    distinct: true
    filter: {column: StageName, equals: "X-Ray Received"}
  bread_reached:
    entity: stages
    agg: count
    column: LeadId
    distinct: true
    filter: {column: StageName, equals: "B-Read Results"}
  bank_complete_reached:
    entity: stages
    agg: count
    column: LeadId
    distinct: true
    filter: {column: StageName, equals: "Bank Complete"}

metrics:
  new_leads:
    label: "New leads"
    description: "Count of intake leads in the period."
    measure: lead_count
    synonyms: ["leads", "total leads", "new intakes"]
  unique_leads:
    label: "Unique leads"
    description: "Count of distinct leads."
    measure: distinct_leads
    synonyms: ["distinct leads"]
  # leads_wow_pct, leads_mom_pct and leads_ytd used to live here. Week-over-week and
  # year-to-date are properties of a question, not of a metric, so they are now intent
  # modifiers (`compare`, `accumulate`) that every metric can carry — including the ratios
  # and derived metrics a comparison metric could never wrap. See app/query/intent.py.

  # Intake funnel — leads reaching each milestone, and the conversion rates.
  vouchers:
    label: "Vouchers"
    description: "Leads reaching the voucher (initial intake) stage."
    measure: voucher_reached
    synonyms: ["voucher", "leads reached voucher"]
  leads_reached_xray:
    label: "Leads reached X-Ray"
    description: "Leads reaching the X-Ray Received stage."
    measure: xray_reached
    synonyms: ["x-ray received"]
  leads_reached_bread:
    label: "Leads reached B-Read"
    description: "Leads reaching the B-Read Results stage."
    measure: bread_reached
    synonyms: ["b-read results"]
  leads_reached_bank_complete:
    label: "Leads reached Bank Complete"
    description: "Leads reaching the Bank Complete stage."
    measure: bank_complete_reached
    synonyms: ["bank complete"]
  revenue:
    type: derived
    label: "Revenue (Vouchers)"
    description: "Vouchers valued at the average case fee."
    measures: ["voucher_reached"]
    expression: "voucher_reached * case_fee"
    format: currency
    # Linear in its one measure, so a year's revenue is the sum of its weeks. Inference
    # cannot see that through a formula, so it is declared — this is what makes YTD revenue
    # expressible (docs/status.md, D4's KPI row).
    additive: true
    synonyms: ["revenue vouchers"]
  voucher_rate:
    type: ratio
    label: "Voucher rate %"
    description: "Share of leads reaching the voucher stage."
    numerator: voucher_reached
    denominator: stage_leads
    format: percent
    synonyms: ["voucher conversion", "conversion rate"]
  xray_rate:
    type: ratio
    label: "X-Ray rate %"
    description: "Share of leads reaching the X-Ray stage."
    numerator: xray_reached
    denominator: stage_leads
    format: percent
  bank_complete_rate:
    type: ratio
    label: "Bank Complete rate %"
    description: "Share of leads reaching the Bank Complete stage."
    numerator: bank_complete_reached
    denominator: stage_leads
    format: percent
