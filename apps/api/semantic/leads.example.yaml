# PLACEHOLDER semantic definitions — illustrative only.
#
# These let the API run end to end (list metrics, compile SQL) before the real KRW
# schema is available. Replace them with definitions derived from the actual Azure SQL
# views before M2/M3 (docs O-2). Sources/columns below are invented, not real.
#
# The four types split logical concepts from physical bindings (docs/concepts.md):
# only an entity names a table/view; dimensions and measures point at an entity by name,
# and a metric surfaces a measure.

entities:
  leads:
    label: "Leads"
    source: analytics.v_leads
    # A key edge to the geo table; the compiler joins along it when a query groups by a
    # geo dimension. A metric on leads can then be sliced by geo.state without leads
    # carrying a state column.
    joins:
      - to: geo
        left: lead_id
        right: lead_id
  geo:
    label: "Geography"
    source: analytics.v_geo

dimensions:
  channel:
    label: "Channel"
    entity: leads
    column: channel
    members: ["Facebook", "Google", "Referral", "Linear TV", "Website"]
  region:
    label: "Region"
    entity: leads
    column: metro
    synonyms: ["metro", "area"]
  # A date dimension (role "lead") — the compiler may bucket it by grain and range on it.
  # A second role (referral) would be a separate temporal dimension on its own entity.
  lead_date:
    label: "Lead date"
    entity: leads
    column: created_at
    date_role: lead
    synonyms: ["date", "created"]
  # Lives on the geo entity — reached by joining leads ↔ geo.
  state:
    label: "State"
    entity: geo
    column: state
    synonyms: ["province"]

# Measures are structured (agg + column) so the compiler binds each column to its table:
# in a joined query count(distinct lead_id) is unambiguous by construction.
measures:
  lead_count:
    entity: leads
    agg: count
  unique_leads:
    entity: leads
    agg: count
    column: lead_id
    distinct: true
  spend_total:
    entity: leads
    agg: sum
    column: spend
  revenue_total:
    entity: leads
    agg: sum
    column: revenue

metrics:
  # Simple — surfaces one measure (type defaults to "simple" when omitted).
  new_leads:
    label: "New leads"
    description: "Count of new intake leads in the period."
    measure: lead_count
    synonyms: ["leads", "new intakes"]
  marketing_spend:
    label: "Marketing spend"
    description: "Total marketing spend in the period."
    measure: spend_total
    format: currency
    synonyms: ["spend", "ad spend"]
  # Distinct count of the join key — stays unambiguous when grouped by geo.state.
  unique_leads:
    label: "Unique leads"
    description: "Count of distinct leads."
    measure: unique_leads
    synonyms: ["distinct leads"]
  # Ratio — one measure over another, guarded against a zero denominator.
  cost_per_lead:
    type: ratio
    label: "Cost per lead"
    description: "Marketing spend divided by new leads."
    numerator: spend_total
    denominator: lead_count
    format: currency
    synonyms: ["CPL", "cost per acquisition"]
  roas:
    type: ratio
    label: "ROAS"
    description: "Return on ad spend: revenue divided by marketing spend."
    numerator: revenue_total
    denominator: spend_total
    synonyms: ["return on ad spend"]
  # Comparison — a measure's change vs the prior period (WoW/MoM); buckets on lead_date.
  leads_wow_pct:
    type: comparison
    label: "Leads WoW %"
    description: "Week-over-week percent change in new leads."
    measure: lead_count
    period: wow
    kind: pct
    format: percent
    synonyms: ["leads week over week"]
  # Cumulative — a running total that resets each period (MTD/YTD).
  spend_ytd:
    type: cumulative
    label: "Marketing spend YTD"
    description: "Year-to-date running total of marketing spend."
    measure: spend_total
    window: ytd
    format: currency
