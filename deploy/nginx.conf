server {
    listen 80;
    server_name _;

    # The app has no sign-in of its own yet (F1, #21), so the proxy is what stands between a
    # public IP and the dashboard.
    auth_basic "Corelantic";
    auth_basic_user_file /etc/nginx/htpasswd;

    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 2m;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # A live query against the warehouse can take minutes (#63); the 60s default cuts it off.
        proxy_read_timeout 180s;
        proxy_buffering off;
    }
}
